[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "S", "B", "A", "C4", "SIM"]
# B008: FastAPI uses Depends() in function signatures — this is the canonical pattern
# E501: Long lines in migration files and comments are acceptable
ignore = ["S101", "B008", "E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
